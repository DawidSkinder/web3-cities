name: Deploy Top Coins Proxy Worker

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "workers/top-coins/**"
      - ".github/workflows/deploy-top-coins-proxy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: workers/top-coins
          command: deploy
