name: Generate Top Coins Snapshot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: top-coins-snapshot
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate minute snapshots (5x per run)
        env:
          BINANCE_DATA_BASE: https://data-api.binance.vision
        run: |
          set -euo pipefail

          ITERATIONS=5
          for i in $(seq 1 "$ITERATIONS"); do
            echo "[top-coins] tick $i/$ITERATIONS @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            node scripts/generate-top-coins-snapshot.mjs

            if git diff --quiet -- public/data/top-coins.json public/data/logos; then
              echo "[top-coins] no changes"
            else
              git add public/data/top-coins.json public/data/logos
              git commit -m "chore(data): update top coins snapshot"
              git push origin "HEAD:${GITHUB_REF_NAME}"
            fi

            if [ "$i" -lt "$ITERATIONS" ]; then
              now_epoch="$(date +%s)"
              sleep_for=$((60 - (now_epoch % 60)))
              if [ "$sleep_for" -le 0 ]; then
                sleep_for=60
              fi
              echo "[top-coins] sleeping ${sleep_for}s until next minute boundary"
              sleep "$sleep_for"
            fi
          done
