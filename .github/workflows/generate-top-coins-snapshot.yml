name: Generate Top Coins Snapshot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: top-coins-snapshot
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate snapshot
        run: node scripts/generate-top-coins-snapshot.mjs

      - name: Commit snapshot if changed
        run: |
          if git diff --quiet -- public/data/top-coins.json; then
            echo "No snapshot changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/top-coins.json
          git commit -m "chore(data): update top coins snapshot"
          git push
