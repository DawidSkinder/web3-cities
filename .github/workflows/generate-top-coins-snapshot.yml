name: Generate Top Coins Snapshot

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: top-coins-snapshot
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate and push snapshot (retry on race)
        env:
          BINANCE_DATA_BASE: https://data-api.binance.vision
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"
          ATTEMPTS=4

          for attempt in $(seq 1 "$ATTEMPTS"); do
            echo "[top-coins] attempt ${attempt}/${ATTEMPTS} @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"

            git fetch origin "${BRANCH}"
            git reset --hard "origin/${BRANCH}"

            node scripts/generate-top-coins-snapshot.mjs

            if git diff --quiet -- public/data/top-coins.json public/data/logos; then
              echo "[top-coins] no changes"
              exit 0
            fi

            git add public/data/top-coins.json public/data/logos
            if ! git commit -m "chore(data): update top coins snapshot"; then
              echo "[top-coins] nothing to commit after add"
              exit 0
            fi

            if git push origin "HEAD:${BRANCH}"; then
              echo "[top-coins] push ok"
              exit 0
            fi

            echo "[top-coins] push race, retrying..."
            sleep $((attempt * 2))
          done

          echo "[top-coins] failed to push after ${ATTEMPTS} attempts"
          exit 1
