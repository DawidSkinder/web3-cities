name: Generate Top Coins Snapshot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types:
      - top-coins-loop

permissions:
  contents: write
  actions: read

concurrency:
  group: top-coins-snapshot
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate minute snapshots (5 ticks, race-safe push)
        env:
          BINANCE_DATA_BASE: https://data-api.binance.vision
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"
          TICKS=5
          ATTEMPTS=4

          for tick in $(seq 1 "$TICKS"); do
            echo "[top-coins] tick ${tick}/${TICKS} @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            tick_ok=0

            for attempt in $(seq 1 "$ATTEMPTS"); do
              echo "[top-coins] tick ${tick}: attempt ${attempt}/${ATTEMPTS}"
              git fetch origin "${BRANCH}"
              git reset --hard "origin/${BRANCH}"

              node scripts/generate-top-coins-snapshot.mjs

              if git diff --quiet -- public/data/top-coins.json public/data/logos; then
                echo "[top-coins] tick ${tick}: no changes"
                tick_ok=1
                break
              fi

              git add public/data/top-coins.json public/data/logos
              if ! git commit -m "chore(data): update top coins snapshot"; then
                echo "[top-coins] tick ${tick}: nothing to commit"
                tick_ok=1
                break
              fi

              if git push origin "HEAD:${BRANCH}"; then
                echo "[top-coins] tick ${tick}: push ok"
                tick_ok=1
                break
              fi

              echo "[top-coins] tick ${tick}: push race, retrying..."
              sleep $((attempt * 2))
            done

            if [ "${tick_ok}" -ne 1 ]; then
              echo "[top-coins] tick ${tick}: failed after ${ATTEMPTS} attempts"
              exit 1
            fi

            if [ "${tick}" -lt "${TICKS}" ]; then
              now_epoch="$(date +%s)"
              sleep_for=$((60 - (now_epoch % 60)))
              if [ "${sleep_for}" -le 0 ]; then
                sleep_for=60
              fi
              echo "[top-coins] sleeping ${sleep_for}s to next minute boundary"
              sleep "${sleep_for}"
            fi
          done

      - name: Queue next loop run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          queued_count="$(
            curl -sS \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/generate-top-coins-snapshot.yml/runs?status=queued&branch=${GITHUB_REF_NAME}&per_page=50" \
            | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{try{const j=JSON.parse(s);console.log((j.workflow_runs||[]).length);}catch{console.log('0');}})"
          )"

          if [ "${queued_count}" -gt 0 ]; then
            echo "[top-coins] queued runs already present (${queued_count}); skip self-dispatch"
            exit 0
          fi

          payload="$(cat <<JSON
          {"event_type":"top-coins-loop","client_payload":{"from_run_id":"${GITHUB_RUN_ID}","from_event":"${GITHUB_EVENT_NAME}"}}
          JSON
          )"

          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/dispatches" \
            -d "${payload}" >/dev/null

          echo "[top-coins] queued next loop run"
