name: Deploy Vite site to GitHub Pages

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "public/data/top-coins.json"
      - "public/data/top-coins-slot-*.json"
      - "public/data/logos/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_CITY_MODE: ${{ vars.VITE_CITY_MODE }}
          VITE_TOP_COINS_RAW_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/public/data/top-coins.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
